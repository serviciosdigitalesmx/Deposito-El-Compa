<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff6b6b">
  <title>Depósito El Compa - Integrador</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/deposito-unified.css">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/deposito-saas.css">
  <script>
    window.DEPOSITO_GAS_URL = 'https://script.google.com/macros/s/AKfycbw36LgiUW3Mp7ezvsQKcaDOAITZSryrMLdOXf0zu-8AtORq8l_0lwWkMu8RLYaS24ZZ/exec';
  </script>
  <script src="./js/deposito-notifications.js"></script>
  <style>
    :root{--bg:#151827;--panel:#20243a;--panel-2:#2a2f4b;--text:#f4f7ff;--muted:#9ca6c9;--primary:#ff6b6b;--accent:#4ecdc4;--shadow:0 18px 50px rgba(0,0,0,.32)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#222949 0,#151827 58%);color:var(--text)}
    .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:rgba(14,16,28,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:5}
    .bar::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,107,.5),rgba(78,205,196,.5),transparent)}
    .left{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#ff8a6b);display:grid;place-items:center;box-shadow:var(--shadow)}
    .title{font-weight:900;letter-spacing:.01em}.tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:800;transition:.2s ease;position:relative;overflow:hidden}
    .tab:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}
    .tab.active{background:linear-gradient(135deg,var(--primary),#ff7d7d);border-color:transparent;box-shadow:0 10px 24px rgba(255,107,107,.22)}
    .tab.active::after{content:"";position:absolute;inset:auto 12px 6px; height:2px;border-radius:999px;background:rgba(255,255,255,.8)}
    .wrap{height:calc(100vh - 72px)} .panel{display:none;height:100%}.panel.active{display:block}
    iframe{width:100%;height:100%;border:0;background:var(--bg)}
    .fallback{padding:10px 18px;color:var(--muted);font-size:12px;background:rgba(0,0,0,.18);border-top:1px solid rgba(255,255,255,.06)}.fallback a{color:var(--accent)}
    .login{position:fixed;inset:0;background:rgba(7,8,16,.92);display:flex;align-items:center;justify-content:center;z-index:20;padding:16px}
    .card{width:min(420px,100%);background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid rgba(255,107,107,.28);border-radius:18px;padding:26px;box-shadow:var(--shadow)}
    .card h2{margin:0 0 6px;color:#ff8a8a;font-size:1.6rem} .card p{margin:0 0 14px;color:var(--muted);font-size:13px}
    .input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,107,107,.28);color:var(--text);border-radius:12px;padding:12px 14px;outline:none;margin-bottom:10px}
    .btn{width:100%;border:0;background:linear-gradient(135deg,var(--primary),#ff7d7d);color:#fff;font-weight:900;border-radius:12px;padding:12px;cursor:pointer;box-shadow:0 10px 24px rgba(255,107,107,.18)}
    .err{min-height:18px;color:#ff8f9b;font-size:13px;margin-top:8px}
    .tabs, .fallback { animation: fadeIn .35s ease both; }
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
  <div id="login-screen" class="login">
    <div class="card">
      <h2>Acceso interno</h2>
      <p>Un solo acceso para Caja, Productos, Repartidores, Hieleras, Reparto y Archivo</p>
      <input id="master-password" class="input" type="password" placeholder="Contraseña" autocomplete="current-password">
      <button id="master-login-btn" class="btn" type="button">Entrar</button>
      <div id="master-error" class="err"></div>
    </div>
  </div>

  <header class="bar">
    <div class="left">
      <div class="logo">🍻</div>
      <div class="title">Depósito El Compa · Integrador Interno</div>
    </div>
    <nav class="tabs">
      <button id="tab-operativo" class="tab active" type="button">Caja / Operativo</button>
      <button id="tab-productos" class="tab" type="button">Productos</button>
      <button id="tab-repartidores" class="tab" type="button">Repartidores</button>
      <button id="tab-hieleras" class="tab" type="button">Hieleras</button>
      <button id="tab-solicitudes" class="tab" type="button">Solicitudes</button>
      <button id="tab-repartidor" class="tab" type="button">Repartidor</button>
      <button id="tab-corte" class="tab" type="button">Pendiente corte</button>
      <button id="tab-archivo" class="tab" type="button">Archivo</button>
    </nav>
  </header>

  <div class="wrap">
    <section id="panel-operativo" class="panel active"><iframe id="frame-operativo" src="about:blank" title="Operativo"></iframe></section>
    <section id="panel-productos" class="panel"><iframe id="frame-productos" src="about:blank" title="Productos"></iframe></section>
    <section id="panel-repartidores" class="panel"><iframe id="frame-repartidores" src="about:blank" title="Repartidores"></iframe></section>
    <section id="panel-hieleras" class="panel"><iframe id="frame-hieleras" src="about:blank" title="Hieleras"></iframe></section>
    <section id="panel-solicitudes" class="panel"><iframe id="frame-solicitudes" src="about:blank" title="Solicitudes"></iframe></section>
    <section id="panel-repartidor" class="panel"><iframe id="frame-repartidor" src="about:blank" title="Repartidor"></iframe></section>
    <section id="panel-corte" class="panel"><iframe id="frame-corte" src="about:blank" title="Pendiente de corte"></iframe></section>
    <section id="panel-archivo" class="panel"><iframe id="frame-archivo" src="about:blank" title="Archivo"></iframe></section>
  </div>

  <div class="fallback">
    Si algo falla:
    <a href="./panel-operativo.html" target="_blank">Caja / Operativo</a> |
    <a href="./panel-productos.html" target="_blank">Productos</a> |
    <a href="./panel-repartidores.html" target="_blank">Repartidores</a> |
    <a href="./panel-tecnico.html" target="_blank">Hieleras</a> |
    <a href="./panel-solicitudes.html" target="_blank">Solicitudes</a> |
    <a href="./panel-repartidor.html" target="_blank">Repartidor</a> |
    <a href="./panel-corte.html" target="_blank">Pendiente corte</a> |
    <a href="./panel-archivo.html" target="_blank">Archivo</a>
  </div>

  <script>
    const MASTER_PASS = 'Admin1';
    const PANEL_OP = document.getElementById('panel-operativo');
    const PANEL_HI = document.getElementById('panel-hieleras');
    const PANEL_SO = document.getElementById('panel-solicitudes');
    const PANEL_RE = document.getElementById('panel-repartidor');
    const PANEL_CO = document.getElementById('panel-corte');
    const PANEL_AR = document.getElementById('panel-archivo');
    const PANEL_PR = document.getElementById('panel-productos');
    const PANEL_RP = document.getElementById('panel-repartidores');
    const FRAME_OP = document.getElementById('frame-operativo');
    const FRAME_HI = document.getElementById('frame-hieleras');
    const FRAME_SO = document.getElementById('frame-solicitudes');
    const FRAME_RE = document.getElementById('frame-repartidor');
    const FRAME_CO = document.getElementById('frame-corte');
    const FRAME_AR = document.getElementById('frame-archivo');
    const FRAME_PR = document.getElementById('frame-productos');
    const FRAME_RP = document.getElementById('frame-repartidores');
    const LOGIN = document.getElementById('login-screen');
    const PASS = document.getElementById('master-password');
    const ERR = document.getElementById('master-error');
    const SRC = {
      operativo: './panel-operativo.html',
      productos: './panel-productos.html',
      repartidores: './panel-repartidores.html',
      hieleras: './panel-tecnico.html',
      solicitudes: './panel-solicitudes.html',
      repartidor: './panel-repartidor.html',
      corte: './panel-corte.html',
      archivo: './panel-archivo.html'
    };

    function loadFrame(name) {
      const map = { operativo: FRAME_OP, productos: FRAME_PR, repartidores: FRAME_RP, hieleras: FRAME_HI, solicitudes: FRAME_SO, repartidor: FRAME_RE, corte: FRAME_CO, archivo: FRAME_AR };
      const frame = map[name];
      if (frame && frame.src === 'about:blank') frame.src = `${SRC[name]}?v=${Date.now()}`;
    }
    function show(name) {
      ['operativo','productos','repartidores','hieleras','solicitudes','repartidor','corte','archivo'].forEach(n => {
        document.getElementById(`panel-${n}`).classList.toggle('active', n === name);
        document.getElementById(`tab-${n}`).classList.toggle('active', n === name);
        if (n === name) loadFrame(n);
      });
    }
    function unlock() {
      const value = (PASS.value || '').trim();
      if (value !== MASTER_PASS) {
        ERR.textContent = 'Contraseña incorrecta';
        return;
      }
      LOGIN.style.display = 'none';
      show('operativo');
    }
    document.getElementById('master-login-btn').addEventListener('click', unlock);
    PASS.addEventListener('keydown', (e) => { if (e.key === 'Enter') unlock(); });
    document.getElementById('tab-operativo').addEventListener('click', () => show('operativo'));
    document.getElementById('tab-productos').addEventListener('click', () => show('productos'));
    document.getElementById('tab-repartidores').addEventListener('click', () => show('repartidores'));
    document.getElementById('tab-hieleras').addEventListener('click', () => show('hieleras'));
    document.getElementById('tab-solicitudes').addEventListener('click', () => show('solicitudes'));
    document.getElementById('tab-repartidor').addEventListener('click', () => show('repartidor'));
    document.getElementById('tab-corte').addEventListener('click', () => show('corte'));
    document.getElementById('tab-archivo').addEventListener('click', () => show('archivo'));
    if (window.DepositoPWA) {
      window.DepositoPWA.registerSW();
      window.DepositoPWA.requestPermission();
      window.DepositoPWA.attachOrderPolling({
        endpoint: window.DEPOSITO_GAS_URL,
        signatureKey: 'DEPOSITO_INTEGRADOR_PEDIDOS_SIGNATURE',
        intervalMs: 15000,
        filter: row => String(row.estado || row.status || '').toLowerCase() === 'nuevo',
        onNewItem: async ({ rows }) => {
          const count = rows.length;
          await window.DepositoPWA.notifyUser('Pedido nuevo', `Nuevo pedido detectado desde el integrador. Tienes ${count} pendiente${count === 1 ? '' : 's'}.`, 'urgent');
        }
      });
    }
  </script>
</body>
</html>
