<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depósito El Compa - Repartidor</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/deposito-unified.css">
  <style>
    :root{--bg:#12141f;--panel:#1b1f2f;--panel-2:#262a3d;--text:#f3f4f6;--muted:#97a0b3;--accent:#a78bfa;--accent-2:#4ecdc4;--shadow:0 12px 30px rgba(0,0,0,.25)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#1b1f2f 0,#12141f 55%);color:var(--text)}
    header{position:sticky;top:0;z-index:10;padding:16px 20px;background:rgba(17,20,31,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08)}
    .bar{display:flex;justify-content:space-between;align-items:center;gap:14px;max-width:1400px;margin:0 auto;flex-wrap:wrap}
    .title{display:flex;flex-direction:column;gap:4px}
    .title strong{font-size:20px}
    .title span{color:var(--muted);font-size:13px}
    .stats{display:flex;gap:10px;flex-wrap:wrap}
    .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:10px 14px;min-width:120px}
    .stat b{display:block;font-size:22px;margin-top:4px}
    main{max-width:1400px;margin:0 auto;padding:18px 20px 28px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .toolbar .hint{color:var(--muted);font-size:13px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:11px 12px;font-weight:800;cursor:pointer;transition:.2s transform,.2s opacity}
    button:hover{transform:translateY(-1px)}
    .primary{background:var(--accent);color:#fff}
    .success{background:var(--accent-2);color:#04231f}
    .secondary{background:rgba(255,255,255,.08);color:var(--text)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .folio{font-weight:800;font-size:18px;color:#fff}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;text-transform:capitalize}
    .asignado{background:rgba(167,139,250,.14);color:#a78bfa}
    .en_ruta{background:rgba(96,165,250,.14);color:#60a5fa}
    .entregado{background:rgba(52,211,153,.14);color:#34d399}
    .listo{background:rgba(78,205,196,.14);color:#4ecdc4}
    .meta{margin-top:12px;color:var(--muted);font-size:13px;line-height:1.5}
    .items{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08);display:grid;gap:8px}
    .item{display:flex;justify-content:space-between;gap:12px;font-size:13px}
    .item span:last-child{color:#dbe3ff}
    .empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.02)}
    .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent-2);display:inline-block;box-shadow:0 0 0 0 rgba(78,205,196,.8);animation:pulse 1.8s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(78,205,196,.8)}70%{box-shadow:0 0 0 12px rgba(78,205,196,0)}100%{box-shadow:0 0 0 0 rgba(78,205,196,0)}}
    .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);opacity:0;pointer-events:none;background:#111827;color:#fff;padding:12px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow);transition:.25s}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .busy{position:relative;overflow:hidden;opacity:.85;pointer-events:none}
    .busy:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);animation:shimmer 1.1s infinite}
    @keyframes shimmer{to{transform:translateX(100%)}}
    .btn-loading{display:inline-flex;align-items:center;gap:8px}
    .btn-loading:before{content:"";width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div id="login-screen" style="position:fixed;inset:0;background:rgba(7,8,16,.92);display:flex;align-items:center;justify-content:center;z-index:20;padding:16px">
    <div style="width:min(420px,100%);background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid rgba(167,139,250,.28);border-radius:18px;padding:24px;box-shadow:var(--shadow)">
      <h2 style="margin:0 0 6px;color:#c4b5fd;font-size:1.6rem">Acceso repartidor</h2>
      <p style="margin:0 0 14px;color:var(--muted);font-size:13px">Un solo acceso para ver tus pedidos asignados y confirmar entregas.</p>
      <input id="master-password" type="password" placeholder="Contraseña" autocomplete="current-password" style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(167,139,250,.28);color:var(--text);border-radius:12px;padding:12px 14px;outline:none;margin-bottom:10px">
      <button id="master-login-btn" type="button" style="width:100%;border:0;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;font-weight:900;border-radius:12px;padding:12px;cursor:pointer;box-shadow:0 10px 24px rgba(167,139,250,.18)">Entrar</button>
      <div id="master-error" style="min-height:18px;color:#fda4af;font-size:13px;margin-top:8px"></div>
    </div>
  </div>
  <header>
    <div class="bar">
      <div class="title">
        <strong><i class="fa-solid fa-motorcycle"></i> Repartidor</strong>
        <span>Pedidos asignados para salir, marcar en ruta y confirmar entrega.</span>
      </div>
      <div class="stats">
        <div class="stat"><span class="pulse"></span> vivo<b id="count-total">0</b><small>Pedidos</small></div>
        <div class="stat"><b id="count-asignado">0</b><small>Asignados</small></div>
        <div class="stat"><b id="count-ruta">0</b><small>En ruta</small></div>
        <div class="stat"><b id="count-entregado">0</b><small>Entregados</small></div>
      </div>
    </div>
  </header>
  <main>
    <div class="toolbar">
      <div class="hint">Este panel solo muestra lo que caja ya asignó al repartidor.</div>
      <div class="actions">
        <button class="secondary" id="btn-refresh"><i class="fa-solid fa-rotate"></i> Refrescar</button>
        <a class="secondary" href="./panel-corte.html" target="_blank" style="text-decoration:none;padding:11px 12px;border-radius:12px;display:inline-flex;align-items:center;gap:8px;font-weight:800;"><i class="fa-solid fa-file-invoice-dollar"></i> Corte</a>
      </div>
    </div>
    <div id="list" class="grid"></div>
  </main>
  <script>
    window.DEPOSITO_GAS_URL = 'https://script.google.com/macros/s/AKfycbw36LgiUW3Mp7ezvsQKcaDOAITZSryrMLdOXf0zu-8AtORq8l_0lwWkMu8RLYaS24ZZ/exec';
  </script>
  <script src="./js/deposito-api.js"></script>
  <script>
    const AUTH_ROLE = 'repartidor';
    const AUTH_PIN = '2222';
    const AUTH_TOKEN_KEY = 'DEPOSITO_GAS_TOKEN_REPARTIDOR';
    const AUTH_USER_KEY = 'DEPOSITO_GAS_USER_REPARTIDOR';
    const list = document.getElementById('list');
    const toast = document.getElementById('toast');
    let lastSignature = '';
    let busyCount = 0;
    let currentUser = null;

    function setApiAuth(token) {
      window.DEPOSITO_API.setConfig({
        endpoint: window.DEPOSITO_GAS_URL,
        token: token || ''
      });
    }

    async function ensureAuth() {
      const cached = localStorage.getItem(AUTH_TOKEN_KEY);
      if (cached) {
        setApiAuth(cached);
        try {
          currentUser = JSON.parse(localStorage.getItem(AUTH_USER_KEY) || 'null');
        } catch (_) {
          currentUser = null;
        }
        return cached;
      }
      const res = await window.DEPOSITO_API.get(`?action=login&role=${encodeURIComponent(AUTH_ROLE)}&pin=${encodeURIComponent(AUTH_PIN)}&t=${Date.now()}`);
      if (!res || !res.ok || !res.token) {
        throw new Error((res && res.error) || 'No se pudo autenticar repartidor');
      }
      localStorage.setItem(AUTH_TOKEN_KEY, res.token);
      if (res.user) {
        localStorage.setItem(AUTH_USER_KEY, JSON.stringify(res.user));
      }
      setApiAuth(res.token);
      currentUser = res.user || null;
      return res.token;
    }

    async function unlock() {
      const value = (document.getElementById('master-password').value || '').trim();
      const err = document.getElementById('master-error');
      if (value !== '2222') {
        err.textContent = 'Contraseña incorrecta';
        return;
      }
      err.textContent = '';
      await ensureAuth();
      document.getElementById('login-screen').style.display = 'none';
      load(true);
    }

    function showToast(msg, ms = 2200) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
    }

    function setBusy(on) {
      busyCount += on ? 1 : -1;
      busyCount = Math.max(0, busyCount);
      list.classList.toggle('busy', busyCount > 0);
      document.querySelectorAll('button').forEach(btn => {
        if (btn.id === 'btn-refresh') return;
        btn.disabled = busyCount > 0;
      });
    }

    async function withButtonFeedback(button, label, fn) {
      const original = button.innerHTML;
      button.disabled = true;
      button.innerHTML = `<span class="btn-loading"></span>${label}`;
      setBusy(true);
      try {
        return await fn();
      } finally {
        setBusy(false);
        button.disabled = false;
        button.innerHTML = original;
      }
    }

    function badge(status) {
      const s = String(status || 'asignado').toLowerCase();
      return `<span class="badge ${s}"><i class="fa-solid fa-circle"></i> ${s.replaceAll('_', ' ')}</span>`;
    }

    function signature(rows) {
      return rows.map(r => `${r.id}|${r.estado || r.status || ''}|${r.updated_at || ''}`).join('||');
    }

    function waLink(order) {
      const phone = String(order.telefono || order.phone || '').replace(/\D/g, '');
      if (!phone) return '';
      const msg = `Hola ${order.cliente || order.customer || ''}, tu pedido ${order.id || ''} va en camino desde Depósito El Compa.`;
      return `https://wa.me/52${phone}?text=${encodeURIComponent(msg)}`;
    }

    async function markRoute(id, button) {
      await withButtonFeedback(button, 'Marcando...', async () => {
        await window.DEPOSITO_API.post('?action=enRuta', { id, estado: 'en_ruta' });
        showToast('Pedido marcado en ruta');
        await new Promise(resolve => setTimeout(resolve, 250));
        await load(true);
      });
    }

    async function markDelivered(id, button) {
      await withButtonFeedback(button, 'Entregando...', async () => {
        await window.DEPOSITO_API.post('?action=entregado', { id, estado: 'entregado' });
        showToast('Pedido entregado');
        await new Promise(resolve => setTimeout(resolve, 350));
        await load(true);
      });
    }

    function userFilter(row) {
      const estado = String(row.estado || row.status || '').toLowerCase();
      const assigned = String(row.repartidor_id || '').trim();
      const currentId = String(currentUser && currentUser.id ? currentUser.id : '').trim();
      return ['asignado', 'en_ruta'].includes(estado) || (currentId && assigned === currentId);
    }

    async function load(force = false) {
      try {
        await ensureAuth();
        document.getElementById('login-screen').style.display = 'none';
        const res = await window.DEPOSITO_API.get('?action=pedidos&t=' + Date.now());
        const rows = Array.isArray(res.data) ? res.data : [];
        currentUser = currentUser || JSON.parse(localStorage.getItem('DEPOSITO_GAS_USER') || 'null');
        const filtered = rows.filter(userFilter);
        const sig = signature(filtered);
        if (!force && sig === lastSignature) return;
        lastSignature = sig;

        document.getElementById('count-total').textContent = filtered.length;
        document.getElementById('count-asignado').textContent = filtered.filter(r => String(r.estado || r.status || '').toLowerCase() === 'asignado').length;
        document.getElementById('count-ruta').textContent = filtered.filter(r => String(r.estado || r.status || '').toLowerCase() === 'en_ruta').length;
        document.getElementById('count-entregado').textContent = filtered.filter(r => String(r.estado || r.status || '').toLowerCase() === 'entregado').length;

        const ordered = filtered.sort((a, b) => String(b.updated_at || b.fecha_hora || '').localeCompare(String(a.updated_at || a.fecha_hora || '')));
        list.innerHTML = ordered.length ? ordered.map(order => {
          const status = String(order.estado || order.status || 'asignado').toLowerCase();
          const items = Array.isArray(order.items) ? order.items : [];
          const totalMoney = Number(order.total || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });
          const phone = order.telefono || order.phone || '';
          return `
            <article class="card">
              <div class="top">
                <div>
                  <div class="folio">#${String(order.id).slice(-4)}</div>
                  <div class="meta"><strong>${order.cliente || order.customer || 'Sin cliente'}</strong><br>${phone || 'Sin teléfono'}</div>
                </div>
                ${badge(status)}
              </div>
              <div class="meta">${order.direccion || order.address || 'Sin dirección'}</div>
              <div class="items">
                ${items.length ? items.map(i => `<div class="item"><span>${i.qty || i.cantidad || 1} x ${i.name || i.nombre || i.concepto || 'Producto'}</span><span>${Number(i.price || i.precio || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' })}</span></div>`).join('') : '<div class="item"><span>Pedido sin detalle cargado</span><span>---</span></div>'}
              </div>
              <div class="meta"><strong>Total:</strong> ${totalMoney}</div>
              <div class="actions">
                ${status === 'asignado' ? `<button class="primary" onclick="markRoute('${order.id}', this)">En ruta</button>` : ''}
                ${status === 'en_ruta' ? `<button class="success" onclick="markDelivered('${order.id}', this)">Entregado</button>` : ''}
                ${phone ? `<button class="secondary" onclick="window.open('${waLink(order)}','_blank')">WhatsApp</button>` : ''}
              </div>
            </article>
          `;
        }).join('') : '<div class="empty">No hay pedidos asignados al repartidor.</div>';
      } catch (e) {
        list.innerHTML = `<div class="empty">Error al cargar repartidor: ${e.message}</div>`;
      }
    }

    document.getElementById('master-login-btn').addEventListener('click', unlock);
    document.getElementById('master-password').addEventListener('keydown', (e) => { if (e.key === 'Enter') unlock(); });
    document.getElementById('btn-refresh').addEventListener('click', () => load(true));
    setInterval(() => load(false), 15000);
  </script>
</body>
</html>
