<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depósito El Compa - Productos</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/deposito-saas.css">
  <style>
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#1b1f2f 0,#12141f 55%);color:#f3f4f6}
    header{position:sticky;top:0;background:rgba(17,20,31,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08);padding:16px 20px;z-index:10}
    .bar,.wrap{max-width:1400px;margin:0 auto}
    .bar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .title{display:flex;flex-direction:column;gap:4px}
    .title strong{font-size:20px}
    .title span{color:#97a0b3;font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;padding:18px 20px 28px}
    .card{background:linear-gradient(180deg,#1b1f2f,#262a3d);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    .card h3{margin:0 0 6px}
    .meta{color:#97a0b3;font-size:13px;line-height:1.5}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(78,205,196,.14);color:#4ecdc4}
    .price{font-size:24px;font-weight:800;color:#ff6b6b;margin:10px 0 0}
    .img{width:100%;height:160px;border-radius:14px;object-fit:cover;background:#0f121a;border:1px solid rgba(255,255,255,.08)}
    .toplinks{display:flex;gap:10px;flex-wrap:wrap}
    .toplinks a{color:#fff;text-decoration:none;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.08)}
    .empty{padding:28px;text-align:center;color:#97a0b3;border:1px dashed rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.02)}
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="title">
        <strong><i class="fa-solid fa-bottle-water"></i> Productos</strong>
        <span>Catálogo y gestión visual de inventario</span>
      </div>
      <div class="toplinks">
        <a href="./admin.html">Admin</a>
        <a href="./integrador.html">Integrador</a>
      </div>
    </div>
  </header>
  <main class="wrap"><div id="list" class="grid"></div></main>
  <script>
    window.DEPOSITO_GAS_URL = 'https://script.google.com/macros/s/AKfycbw36LgiUW3Mp7ezvsQKcaDOAITZSryrMLdOXf0zu-8AtORq8l_0lwWkMu8RLYaS24ZZ/exec';
  </script>
  <script src="./js/deposito-api.js"></script>
  <script>
    const AUTH_ROLE = 'admin';
    const AUTH_PIN = '1111';
    const AUTH_TOKEN_KEY = 'DEPOSITO_GAS_TOKEN';
    const list = document.getElementById('list');

    function setApiAuth(token) {
      window.DEPOSITO_API.setConfig({ endpoint: window.DEPOSITO_GAS_URL, token: token || '' });
    }

    async function ensureAuth() {
      const cached = localStorage.getItem(AUTH_TOKEN_KEY);
      if (cached) {
        setApiAuth(cached);
        return cached;
      }
      const res = await window.DEPOSITO_API.get(`?action=login&role=${AUTH_ROLE}&pin=${AUTH_PIN}&t=${Date.now()}`);
      if (!res?.ok || !res.token) throw new Error(res?.error || 'No se pudo autenticar admin');
      localStorage.setItem(AUTH_TOKEN_KEY, res.token);
      setApiAuth(res.token);
      return res.token;
    }

    function card(p) {
      const img = p.imagen_url || p.image || '';
      const active = String(p.activo || 'true').toLowerCase() === 'true';
      const src = img.startsWith('http') || img.startsWith('data:') ? img : `assets/images/${img}`;
      return `<article class="card">
        <img class="img" src="${src}" alt="${p.nombre || 'Producto'}" onerror="this.src='assets/images/modelo.png'">
        <div style="margin-top:12px;display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
          <div>
            <h3>${p.nombre || 'Sin nombre'}</h3>
            <div class="meta">Categoría: ${p.categoria || '---'}<br>Stock: ${p.stock ?? '---'}</div>
          </div>
          <span class="badge">${active ? 'Activo' : 'Inactivo'}</span>
        </div>
        <div class="price">$${Number(p.precio || 0).toFixed(2)}</div>
      </article>`;
    }

    async function load() {
      list.innerHTML = '<div class="empty">Cargando productos...</div>';
      try {
        await ensureAuth();
        const res = await window.DEPOSITO_API.get('?action=productos&t=' + Date.now());
        const rows = Array.isArray(res.data) ? res.data : [];
        list.innerHTML = rows.length ? rows.map(card).join('') : '<div class="empty">No hay productos cargados.</div>';
      } catch (e) {
        list.innerHTML = `<div class="empty">Error al cargar productos: ${e.message}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
