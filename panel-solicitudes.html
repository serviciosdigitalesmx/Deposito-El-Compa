<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff6b6b">
  <title>Depósito El Compa - Solicitudes</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/deposito-unified.css">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/deposito-saas.css">
  <style>
    :root{--bg:#12141f;--panel:#1b1f2f;--panel-2:#262a3d;--text:#f3f4f6;--muted:#97a0b3;--accent:#ff6b6b;--accent-2:#4ecdc4;--warn:#fbbf24;--danger:#f87171;--shadow:0 12px 30px rgba(0,0,0,.25)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#1b1f2f 0,#12141f 55%);color:var(--text)}
    header{position:sticky;top:0;z-index:10;padding:16px 20px;background:rgba(17,20,31,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08)}
    .bar{display:flex;justify-content:space-between;align-items:center;gap:14px;max-width:1400px;margin:0 auto}
    .title{display:flex;flex-direction:column;gap:4px}
    .title strong{font-size:20px}
    .title span{color:var(--muted);font-size:13px}
    .stats{display:flex;gap:10px;flex-wrap:wrap}
    .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 14px;min-width:120px}
    .stat b{display:block;font-size:20px}
    main{max-width:1400px;margin:0 auto;padding:18px 20px 28px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .toolbar .hint{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .folio{font-weight:800;font-size:18px;color:#fff}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;text-transform:capitalize}
    .nuevo{background:rgba(251,191,36,.14);color:#fbbf24}
    .aceptado{background:rgba(78,205,196,.14);color:#4ecdc4}
    .en_hieleras,.listo{background:rgba(96,165,250,.14);color:#60a5fa}
    .en_ruta{background:rgba(167,139,250,.14);color:#a78bfa}
    .entregado{background:rgba(52,211,153,.14);color:#34d399}
    .cancelado{background:rgba(248,113,113,.14);color:#f87171}
    .meta{margin-top:12px;color:var(--muted);font-size:13px;line-height:1.5}
    .meta strong{color:var(--text)}
    .items{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08);display:grid;gap:8px}
    .item{display:flex;justify-content:space-between;gap:12px;font-size:13px}
    .item span:last-child{color:#dbe3ff}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    button{border:0;border-radius:12px;padding:11px 12px;font-weight:800;cursor:pointer;transition:.2s transform,.2s opacity}
    button:hover{transform:translateY(-1px)}
    .primary{background:var(--accent);color:#fff}
    .secondary{background:rgba(255,255,255,.08);color:var(--text)}
    .success{background:var(--accent-2);color:#04231f}
    .ghost{background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--text)}
    .empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.02)}
    .refresh{font-size:13px;color:var(--muted)}
    .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent-2);display:inline-block;box-shadow:0 0 0 0 rgba(78,205,196,.8);animation:pulse 1.8s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(78,205,196,.8)}70%{box-shadow:0 0 0 12px rgba(78,205,196,0)}100%{box-shadow:0 0 0 0 rgba(78,205,196,0)}}
    .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);opacity:0;pointer-events:none;background:#111827;color:#fff;padding:12px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow);transition:.25s}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .busy{position:relative;overflow:hidden;opacity:.85;pointer-events:none}
    .busy:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);animation:shimmer 1.1s infinite}
    @keyframes shimmer{to{transform:translateX(100%)}}
    .btn-loading{display:inline-flex;align-items:center;gap:8px}
    .btn-loading:before{content:"";width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <header>
    <div class="bar">
      <div class="title">
        <strong><i class="fa-solid fa-file-invoice"></i> Solicitudes / Caja</strong>
        <span>El flujo de entrada que aprueba, rechaza y manda a hieleras</span>
      </div>
      <div class="stats">
        <div class="stat"><span class="refresh"><span class="pulse"></span> vivo</span><b id="count-total">0</b><small>Nuevas</small></div>
        <div class="stat"><b id="count-proceso">0</b><small>En proceso</small></div>
        <div class="stat"><b id="count-listo">0</b><small>Listas</small></div>
      </div>
    </div>
  </header>
  <main>
    <div class="toolbar">
      <div class="hint">Caja ve lo nuevo; al aceptar se marca y después se manda a hieleras.</div>
      <button class="ghost" id="btn-refresh"><i class="fa-solid fa-rotate"></i> Refrescar</button>
    </div>
    <div class="grid" id="list"></div>
  </main>
  <script>
    window.DEPOSITO_GAS_URL = 'https://script.google.com/macros/s/AKfycbw36LgiUW3Mp7ezvsQKcaDOAITZSryrMLdOXf0zu-8AtORq8l_0lwWkMu8RLYaS24ZZ/exec';
  </script>
  <script src="./js/deposito-api.js"></script>
  <script src="./js/deposito-notifications.js"></script>
  <script>
    const AUTH_ROLE = 'caja';
    const AUTH_PIN = '3333';
    const AUTH_TOKEN_KEY = 'DEPOSITO_GAS_TOKEN_SOLICITUDES';
    const list = document.getElementById('list');
    const toast = document.getElementById('toast');
    let pollTimer = null;
    let lastSignature = '';
    let lastVisibleCount = 0;
    let busyCount = 0;

    function setApiAuth(token) {
      window.DEPOSITO_API.setConfig({
        endpoint: window.DEPOSITO_GAS_URL,
        token: token || ''
      });
    }

    async function ensureAuth() {
      const cached = localStorage.getItem(AUTH_TOKEN_KEY);
      if (cached) {
        setApiAuth(cached);
        return cached;
      }
      const res = await window.DEPOSITO_API.get(`?action=login&role=${encodeURIComponent(AUTH_ROLE)}&pin=${encodeURIComponent(AUTH_PIN)}&t=${Date.now()}`);
      if (!res || !res.ok || !res.token) {
        throw new Error((res && res.error) || 'No se pudo autenticar caja');
      }
      localStorage.setItem(AUTH_TOKEN_KEY, res.token);
      setApiAuth(res.token);
      return res.token;
    }

    function showToast(msg, ms = 2200) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
    }

    function pingNewOrder() {
      if (window.DepositoPWA) {
        window.DepositoPWA.notifyUser('Pedido nuevo', 'Llegó una solicitud nueva a caja.', 'urgent');
      }
    }

    function setBusy(on) {
      busyCount += on ? 1 : -1;
      busyCount = Math.max(0, busyCount);
      list.classList.toggle('busy', busyCount > 0);
      document.querySelectorAll('button').forEach(btn => {
        if (btn.id === 'btn-refresh') return;
        btn.disabled = busyCount > 0;
      });
    }

    async function withButtonFeedback(button, label, fn) {
      const original = button.innerHTML;
      button.disabled = true;
      button.innerHTML = `<span class="btn-loading"></span>${label}`;
      setBusy(true);
      try {
        return await fn();
      } finally {
        setBusy(false);
        button.disabled = false;
        button.innerHTML = original;
      }
    }

    function badge(status) {
      const s = String(status || 'nuevo').toLowerCase();
      return `<span class="badge ${s}"><i class="fa-solid fa-circle"></i> ${s.replaceAll('_', ' ')}</span>`;
    }

    function signature(rows) {
      return rows.map(r => `${r.id}|${r.estado || r.status || 'nuevo'}|${r.updated_at || ''}`).join('||');
    }

    function waLink(order) {
      const phone = String(order.telefono || order.phone || '').replace(/\D/g, '');
      if (!phone) return '';
      const msg = `Hola ${order.cliente || order.customer || ''}, tu pedido ${order.id || ''} fue aceptado por Depósito El Compa.`;
      return `https://wa.me/52${phone}?text=${encodeURIComponent(msg)}`;
    }

    async function moveToHieleras(id, button) {
      await withButtonFeedback(button, 'Enviando...', async () => {
        await window.DEPOSITO_API.post('?action=pedidoListo', { id, estado: 'en_hieleras' });
        showToast('Pedido enviado a hieleras');
        await load(true);
      });
    }

    async function load(force = false) {
      try {
        await ensureAuth();
        const res = await window.DEPOSITO_API.get('?action=pedidos&t=' + Date.now());
        const rows = Array.isArray(res.data) ? res.data : [];
        const visible = rows.filter(r => String(r.estado || r.status || 'nuevo').toLowerCase() === 'nuevo');
        const previousVisibleCount = lastVisibleCount;
        const sig = signature(visible);
        if (!force && sig === lastSignature) return;
        if (lastSignature && sig !== lastSignature && visible.length > previousVisibleCount) {
          pingNewOrder();
        }
        lastSignature = sig;
        lastVisibleCount = visible.length;

        const proceso = rows.filter(r => ['aceptado', 'en_hieleras'].includes(String(r.estado || r.status || '').toLowerCase())).length;
        const listo = rows.filter(r => ['listo', 'en_hieleras'].includes(String(r.estado || r.status || '').toLowerCase())).length;
        document.getElementById('count-total').textContent = visible.length;
        document.getElementById('count-proceso').textContent = proceso;
        document.getElementById('count-listo').textContent = listo;

        const ordered = visible.sort((a, b) => String(b.updated_at || b.fecha_hora || '').localeCompare(String(a.updated_at || a.fecha_hora || '')));
        list.innerHTML = ordered.length ? ordered.map(order => {
          const status = String(order.estado || order.status || 'nuevo').toLowerCase();
          const items = Array.isArray(order.items) ? order.items : [];
          const address = order.direccion || order.address || '';
          const phone = order.telefono || order.phone || '';
          const customer = order.cliente || order.customer || '';
          const totalMoney = Number(order.total || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });
          return `
            <article class="card">
              <div class="top">
                <div>
                  <div class="folio">#${String(order.id).slice(-4)}</div>
                  <div class="meta"><strong>${customer || 'Sin cliente'}</strong><br>${phone || 'Sin teléfono'}</div>
                </div>
                ${badge(status)}
              </div>
              <div class="meta" style="margin-top:10px">${address || 'Sin dirección'}</div>
              <div class="items">
                ${items.length ? items.map(i => `<div class="item"><span>${i.qty || i.cantidad || 1} x ${i.name || i.nombre || i.concepto || 'Producto'}</span><span>${Number(i.price || i.precio || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' })}</span></div>`).join('') : '<div class="item"><span>Pedido sin detalle cargado</span><span>---</span></div>'}
              </div>
              <div class="meta" style="margin-top:12px"><strong>Total:</strong> ${totalMoney}</div>
              <div class="actions">
                <button class="primary" onclick="moveToHieleras('${order.id}', this)">Aceptar y mandar a hieleras</button>
                ${phone ? `<button class="secondary" onclick="window.open('${waLink(order)}','_blank')">WhatsApp</button>` : ''}
              </div>
            </article>
          `;
      }).join('') : '<div class="empty">No hay solicitudes en este momento.</div>';
      } catch (e) {
        console.error('Error al cargar solicitudes:', e);
        list.innerHTML = '<div class="empty">No pudimos cargar las solicitudes. Intenta de nuevo.</div>';
      }
    }

    document.getElementById('btn-refresh').addEventListener('click', () => load(true));
    if (window.DepositoPWA) {
      window.DepositoPWA.registerSW();
      window.DepositoPWA.requestPermission();
    }
    load(true);
    pollTimer = setInterval(() => load(false), 3000);
  </script>
</body>
</html>
