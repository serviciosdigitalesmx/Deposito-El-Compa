<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4ecdc4">
  <title>Depósito El Compa - Hieleras</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/deposito-unified.css">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/deposito-saas.css">
  <style>
    :root{--bg:#12141f;--panel:#1b1f2f;--panel-2:#262a3d;--text:#f3f4f6;--muted:#97a0b3;--accent:#4ecdc4;--accent-2:#60a5fa;--shadow:0 12px 30px rgba(0,0,0,.25)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#1b1f2f 0,#12141f 55%);color:var(--text)}
    header{position:sticky;top:0;z-index:10;padding:16px 20px;background:rgba(17,20,31,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08)}
    .bar{display:flex;justify-content:space-between;align-items:center;gap:14px;max-width:1400px;margin:0 auto;flex-wrap:wrap}
    .title{display:flex;flex-direction:column;gap:4px}
    .title strong{font-size:20px}
    .title span{color:var(--muted);font-size:13px}
    .stats{display:flex;gap:10px;flex-wrap:wrap}
    .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 14px;min-width:120px}
    .stat b{display:block;font-size:20px}
    main{max-width:1400px;margin:0 auto;padding:18px 20px 96px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .toolbar .hint{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px 16px 22px;box-shadow:var(--shadow)}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .folio{font-weight:800;font-size:18px;color:#fff}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;text-transform:capitalize}
    .aceptado{background:rgba(96,165,250,.14);color:#60a5fa}
    .en_hieleras,.listo{background:rgba(78,205,196,.14);color:#4ecdc4}
    .en_ruta{background:rgba(167,139,250,.14);color:#a78bfa}
    .entregado{background:rgba(52,211,153,.14);color:#34d399}
    .meta{margin-top:12px;color:var(--muted);font-size:13px;line-height:1.5}
    .items{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08);display:grid;gap:8px}
    .item{display:flex;justify-content:space-between;gap:12px;font-size:13px}
    .item span:last-child{color:#dbe3ff}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;position:relative;z-index:2}
    .actions select,.actions button{position:relative;z-index:2}
    button{border:0;border-radius:12px;padding:11px 12px;font-weight:800;cursor:pointer;transition:.2s transform,.2s opacity}
    button:hover{transform:translateY(-1px)}
    .primary{background:var(--accent);color:#04231f}
    .secondary{background:rgba(255,255,255,.08);color:var(--text)}
    .empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.02)}
    .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent-2);display:inline-block;box-shadow:0 0 0 0 rgba(96,165,250,.8);animation:pulse 1.8s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(96,165,250,.8)}70%{box-shadow:0 0 0 12px rgba(96,165,250,0)}100%{box-shadow:0 0 0 0 rgba(96,165,250,0)}}
    .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);opacity:0;pointer-events:none;background:#111827;color:#fff;padding:12px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow);transition:.25s}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .busy{position:relative;overflow:hidden;opacity:.85;pointer-events:none}
    .busy:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);animation:shimmer 1.1s infinite}
    @keyframes shimmer{to{transform:translateX(100%)}}
    .btn-loading{display:inline-flex;align-items:center;gap:8px}
    .btn-loading:before{content:"";width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <header>
    <div class="bar">
      <div class="title">
        <strong><i class="fa-solid fa-icicles"></i> Hieleras</strong>
        <span>Solo lo ya aceptado por caja. Aquí se arma y se avisa cuando está listo.</span>
      </div>
      <div class="stats">
        <div class="stat"><span class="pulse"></span> vivo<b id="count-total">0</b><small>Pedidos</small></div>
        <div class="stat"><b id="count-aceptado">0</b><small>Aceptados</small></div>
        <div class="stat"><b id="count-listo">0</b><small>Listos</small></div>
      </div>
    </div>
  </header>
  <main>
    <div class="toolbar">
      <div class="hint">La operación real de hieleras es visual: arma el pedido y avisa a caja cuando ya quedó.</div>
      <button class="secondary" id="btn-refresh"><i class="fa-solid fa-rotate"></i> Refrescar</button>
    </div>
    <div class="grid" id="list"></div>
  </main>
  <script>
    window.DEPOSITO_GAS_URL = 'https://script.google.com/macros/s/AKfycbw36LgiUW3Mp7ezvsQKcaDOAITZSryrMLdOXf0zu-8AtORq8l_0lwWkMu8RLYaS24ZZ/exec';
  </script>
  <script src="./js/deposito-api.js"></script>
  <script src="./js/deposito-notifications.js"></script>
  <script>
    const AUTH_ROLE = 'hieleras';
    const AUTH_PIN = '1111';
    const AUTH_TOKEN_KEY = 'DEPOSITO_GAS_TOKEN_HIELERAS';
    const list = document.getElementById('list');
    const toast = document.getElementById('toast');
    let lastSignature = '';
    let busyCount = 0;
    let repartidores = [];

    function setApiAuth(token) {
      window.DEPOSITO_API.setConfig({
        endpoint: window.DEPOSITO_GAS_URL,
        token: token || ''
      });
    }

    async function ensureAuth() {
      const cached = localStorage.getItem(AUTH_TOKEN_KEY);
      if (cached) {
        setApiAuth(cached);
        return cached;
      }
      const res = await window.DEPOSITO_API.get(`?action=login&role=${encodeURIComponent(AUTH_ROLE)}&pin=${encodeURIComponent(AUTH_PIN)}&t=${Date.now()}`);
      if (!res || !res.ok || !res.token) {
        throw new Error((res && res.error) || 'No se pudo autenticar hieleras');
      }
      localStorage.setItem(AUTH_TOKEN_KEY, res.token);
      setApiAuth(res.token);
      return res.token;
    }

    async function loadRepartidores() {
      try {
        const res = await window.DEPOSITO_API.get('?action=repartidores&t=' + Date.now());
        repartidores = Array.isArray(res.data) ? res.data.filter(r => String(r.activo || 'true').toLowerCase() === 'true') : [];
      } catch (_) {
        repartidores = [];
      }
    }

    function showToast(msg, ms = 2200) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
    }

    function pingKitchenAlert() {
      if (window.DepositoPWA) {
        window.DepositoPWA.notifyUser('Pedido en hieleras', 'Hay un pedido listo o recién aceptado en hieleras.', 'warn');
      }
    }

    function setBusy(on) {
      busyCount += on ? 1 : -1;
      busyCount = Math.max(0, busyCount);
      list.classList.toggle('busy', busyCount > 0);
      document.querySelectorAll('button').forEach(btn => {
        if (btn.id === 'btn-refresh') return;
        btn.disabled = busyCount > 0;
      });
    }

    async function withButtonFeedback(button, label, fn) {
      const original = button.innerHTML;
      button.disabled = true;
      button.innerHTML = `<span class="btn-loading"></span>${label}`;
      setBusy(true);
      try {
        return await fn();
      } finally {
        setBusy(false);
        button.disabled = false;
        button.innerHTML = original;
      }
    }

    function badge(status) {
      const s = String(status || '').toLowerCase();
      return `<span class="badge ${s || 'aceptado'}"><i class="fa-solid fa-circle"></i> ${s.replaceAll('_', ' ') || 'aceptado'}</span>`;
    }

    function signature(rows) {
      return rows.map(r => `${r.id}|${r.estado || r.status || ''}|${r.updated_at || ''}`).join('||');
    }

    async function markReady(id, button) {
      await withButtonFeedback(button, 'Avisando...', async () => {
        await window.DEPOSITO_API.post('?action=pedidoListo', { id, estado: 'listo' });
        showToast('Aviso enviado a caja');
        await load(true);
      });
    }

    async function assignCourier(id, selectEl, button) {
      const repartidorId = String(selectEl.value || '').trim() || (repartidores.length === 1 ? String(repartidores[0].id || '').trim() : '');
      if (!repartidorId) {
        showToast('Selecciona un repartidor');
        return;
      }
      await withButtonFeedback(button, 'Asignando...', async () => {
        await window.DEPOSITO_API.post('?action=asignarRepartidor', { id, repartidorId });
        showToast('Pedido asignado al repartidor');
        await load(true);
      });
    }

    async function load(force = false) {
      try {
        await ensureAuth();
        await loadRepartidores();
        const res = await window.DEPOSITO_API.get('?action=pedidos&t=' + Date.now());
        const rows = Array.isArray(res.data) ? res.data : [];
        const filtered = rows.filter(r => ['aceptado', 'en_hieleras', 'listo'].includes(String(r.estado || r.status || '').toLowerCase()));
        const sig = signature(filtered);
        if (!force && sig === lastSignature) return;
        if (lastSignature && sig !== lastSignature && filtered.some(r => String(r.estado || r.status || '').toLowerCase() === 'en_hieleras')) {
          pingKitchenAlert();
        }
        lastSignature = sig;

        document.getElementById('count-total').textContent = filtered.length;
        document.getElementById('count-aceptado').textContent = filtered.filter(r => String(r.estado || r.status || '').toLowerCase() === 'aceptado').length;
        document.getElementById('count-listo').textContent = filtered.filter(r => ['listo', 'en_hieleras'].includes(String(r.estado || r.status || '').toLowerCase())).length;

        const ordered = filtered.sort((a, b) => String(b.updated_at || b.fecha_hora || '').localeCompare(String(a.updated_at || a.fecha_hora || '')));
        list.innerHTML = ordered.length ? ordered.map(order => {
          const status = String(order.estado || order.status || 'aceptado').toLowerCase();
          const items = Array.isArray(order.items) ? order.items : [];
          const totalMoney = Number(order.total || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });
          const canAssign = status === 'listo';
          return `
            <article class="card">
              <div class="top">
                <div>
                  <div class="folio">#${String(order.id).slice(-4)}</div>
                  <div class="meta"><strong>${order.cliente || order.customer || 'Sin cliente'}</strong></div>
                </div>
                ${badge(status)}
              </div>
              <div class="meta">${order.direccion || order.address || 'Sin dirección'}</div>
              <div class="items">
                ${items.length ? items.map(i => `<div class="item"><span>${i.qty || i.cantidad || 1} x ${i.name || i.nombre || i.concepto || 'Producto'}</span><span>${Number(i.price || i.precio || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' })}</span></div>`).join('') : '<div class="item"><span>Pedido sin detalle cargado</span><span>---</span></div>'}
              </div>
              <div class="meta"><strong>Total:</strong> ${totalMoney}</div>
              <div class="actions">
                ${status === 'en_hieleras' ? `<button class="primary" onclick="markReady('${order.id}', this)">Ya quedó</button>` : ''}
                ${canAssign ? `<select class="secondary" style="min-width:180px;padding:11px 12px;border-radius:12px;" id="sel-${order.id}">
                  <option value="">Asignar repartidor</option>
                  ${repartidores.map(r => `<option value="${r.id}">${r.nombre || 'Repartidor'}${r.telefono ? ' · ' + r.telefono : ''}</option>`).join('')}
                </select><button class="primary" onclick="assignCourier('${order.id}', document.getElementById('sel-${order.id}'), this)">Asignar</button>` : ''}
              </div>
            </article>
          `;
      }).join('') : '<div class="empty">No hay pedidos en hieleras.</div>';
      } catch (e) {
        console.error('Error al cargar hieleras:', e);
        list.innerHTML = '<div class="empty">No pudimos cargar las hieleras. Intenta de nuevo.</div>';
      }
    }

    document.getElementById('btn-refresh').addEventListener('click', () => load(true));
    if (window.DepositoPWA) {
      window.DepositoPWA.registerSW();
      window.DepositoPWA.requestPermission();
    }
    load(true);
    setInterval(() => load(false), 3000);
  </script>
</body>
</html>
